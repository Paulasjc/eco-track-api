spring.application.name=api

# URL de conexiˇn: apunta a localhost (donde Docker ha mapeado el puerto)
spring.datasource.url=jdbc:postgresql://localhost:5432/ecotrack_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraciˇn de JPA / Hibernate
# 'update' crearß las tablas automßticamente basßndose en tus clases @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 1. Obliga a ejecutar scripts aunque sea una DB real (Postgres)
spring.sql.init.mode=always

# 2. IMPORTANTE: Espera a que Hibernate cree las tablas antes de lanzar el SQL
spring.jpa.defer-datasource-initialization=true

# 3. Especifica el archivo por si acaso (puedes usar import.sql o data.sql)
spring.sql.init.data-locations=classpath:import.sql