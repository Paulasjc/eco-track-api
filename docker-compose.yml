services:
  # Definimos el servicio de la base de datos
  db:
    image: postgres:15
    container_name: ecotrack-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecotrack_db
    ports:
      - "5432:5432" # Mapea el puerto del contenedor al de tu PC
    volumes:
      - postgres_data:/var/lib/postgresql/data # Para que los datos no se borren al apagar el contenedor

  backend:
    build:
      context: ./backend/api
    container_name: ecotrack-api
    restart: always
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ecotrack_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: ecotrack-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  postgres_data: